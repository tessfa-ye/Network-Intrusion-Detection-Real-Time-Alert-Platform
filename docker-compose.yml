services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nidas-postgres
    restart: always
    environment:
      POSTGRES_USER: nidas_admin
      POSTGRES_PASSWORD: nidas_password123
      POSTGRES_DB: nidas_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nidas-network

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nidas-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://nidas_admin:nidas_password123@postgres:5432/nidas_db?schema=public
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      - JWT_EXPIRES_IN=7d
    depends_on:
      - postgres
    networks:
      - nidas-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Web Dashboard
  web:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: nidas-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
    depends_on:
      - backend
    networks:
      - nidas-network

networks:
  nidas-network:
    driver: bridge

volumes:
  postgres_data:
